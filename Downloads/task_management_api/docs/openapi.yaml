openapi: 3.0.0
info:
  title: Task Management API
  version: 1.0.0

servers:
  - url: https://task-management-api-ih36.onrender.com

paths:
  /api/auth/signup:
    post:
      summary: Signup user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: Alice Owner
                email:
                  type: string
                  example: alice@test.com
                password:
                  type: string
                  example: Pass123
                role:
                  type: string
                  example: USER
      responses:
        201:
          description: User created
        400:
          description: Missing required fields
        409:
          description: Email already registered

  /api/auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: alice@test.com
                password:
                  type: string
                  example: Pass123
      responses:
        200:
          description: Login success
        400:
          description: Missing email or password
        401:
          description: Invalid credentials

  /api/projects:
    get:
      summary: Get all projects
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of projects
        401:
          description: Unauthorized

    post:
      summary: Create project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  example: Final Project
                description:
                  type: string
                  example: Task management API project
      responses:
        201:
          description: Project created
        400:
          description: Bad request
        401:
          description: Unauthorized

  /api/projects/{id}:
    get:
      summary: Get project by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Project found
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Project not found

    put:
      summary: Update project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Project updated
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Project not found

    delete:
      summary: Delete project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Project deleted
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Project not found

  /api/tasks:
    get:
      summary: Get all tasks
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of tasks
        401:
          description: Unauthorized

    post:
      summary: Create task
      security:
        - bearerAuth: []
      responses:
        201:
          description: Task created

  /api/tasks/{id}:
    delete:
      summary: Delete task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Task deleted

  /api/comments:
    get:
      summary: Get all comments
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of comments

  /api/comments/{id}:
    delete:
      summary: Delete comment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Comment deleted

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT