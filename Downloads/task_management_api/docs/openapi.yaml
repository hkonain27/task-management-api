openapi: 3.0.0
info:
  title: Task Management API
  version: 1.0.0

servers:
  - url: https://task-management-api-ih36.onrender.com

paths:
  /auth/signup:
    post:
      summary: Signup user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: Alice Owner
                email:
                  type: string
                  example: alice@test.com
                password:
                  type: string
                  example: Pass123
                role:
                  type: string
                  example: USER
      responses:
        201:
          description: User created
        400:
          description: Missing required fields
        409:
          description: Email already registered

  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: alice@test.com
                password:
                  type: string
                  example: Pass123
      responses:
        200:
          description: Login success
        400:
          description: Missing email or password
        401:
          description: Invalid credentials

  /projects:
    get:
      summary: Get all projects
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of projects
        401:
          description: Unauthorized

    post:
      summary: Create project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  example: Final Project
                description:
                  type: string
                  example: Task management API project
      responses:
        201:
          description: Project created
        400:
          description: Bad request
        401:
          description: Unauthorized

  /projects/{id}:
    get:
      summary: Get project by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        200:
          description: Project found
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Project not found

    put:
      summary: Update project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Updated Project
                description:
                  type: string
                  example: Updated project description
      responses:
        200:
          description: Project updated
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Project not found

    delete:
      summary: Delete project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        204:
          description: Project deleted
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Project not found

  /tasks:
    get:
      summary: Get all tasks
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of tasks
        401:
          description: Unauthorized

    post:
      summary: Create task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, projectId]
              properties:
                title:
                  type: string
                  example: Build API
                description:
                  type: string
                  example: Implement CRUD endpoints
                status:
                  type: string
                  example: PENDING
                projectId:
                  type: integer
                  example: 1
                dueDate:
                  type: string
                  example: 2026-05-01
      responses:
        201:
          description: Task created
        400:
          description: Bad request
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Project not found

  /tasks/{id}:
    get:
      summary: Get task by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        200:
          description: Task found
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Task not found

    put:
      summary: Update task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Updated Task
                description:
                  type: string
                  example: Updated task description
                status:
                  type: string
                  example: COMPLETED
                dueDate:
                  type: string
                  example: 2026-05-02
      responses:
        200:
          description: Task updated
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Task not found

    delete:
      summary: Delete task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        204:
          description: Task deleted
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Task not found

  /comments:
    get:
      summary: Get all comments
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of comments
        401:
          description: Unauthorized

    post:
      summary: Create comment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, taskId]
              properties:
                content:
                  type: string
                  example: This task is completed.
                taskId:
                  type: integer
                  example: 1
      responses:
        201:
          description: Comment created
        400:
          description: Bad request
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Task not found

  /comments/{id}:
    get:
      summary: Get comment by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        200:
          description: Comment found
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Comment not found

    put:
      summary: Update comment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  example: Updated comment text.
      responses:
        200:
          description: Comment updated
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Comment not found

    delete:
      summary: Delete comment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        204:
          description: Comment deleted
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Comment not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT